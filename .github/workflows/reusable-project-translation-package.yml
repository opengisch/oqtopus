name: 🌎 Project | Translation and package (reusable)

on:
  workflow_call:
    inputs:
      module_name:
        required: true
        type: string
        description: 'Module name (e.g., signalo, tww)'
      qgs_project_file:
        required: true
        type: string
        description: 'QGS project file basename without extension (e.g., signalo, teksi_wastewater)'
      qgs_project_title:
        required: true
        type: string
        description: 'QGS project display title (e.g., Signalo, TWW)'
      pgservice:
        required: true
        type: string
        description: 'PostgreSQL service name (e.g., pg_signalo, pg_tww)'
      db_name:
        required: true
        type: string
        description: 'Database name (e.g., signalo, tww)'
      release_tag:
        required: false
        type: string
        default: ''
        description: 'Release tag to upload project translations as GitHub Release asset'
      pum_install_params:
        required: false
        type: string
        default: '-p SRID 2056'
        description: 'Additional parameters for pum install command'
    secrets:
      TX_TOKEN:
        required: false

jobs:
  build:
    name: Update project translations
    runs-on: ubuntu-24.04
    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}

    env:
      COMPOSE_PROFILES: qgis
      MODULE_NAME: ${{ inputs.module_name }}
      QGS_PROJECT_FILE: ${{ inputs.qgs_project_file }}
      QGS_PROJECT_TITLE: ${{ inputs.qgs_project_title }}
      PGSERVICE: ${{ inputs.pgservice }}
      DB_NAME: ${{ inputs.db_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Transifex
        run: |
          curl -OL https://github.com/transifex/cli/releases/download/v1.6.10/tx-linux-amd64.tar.gz
          tar -xvzf tx-linux-amd64.tar.gz

      - name: Start Docker compose
        run: |
          docker compose up --build -d
          until docker compose exec db pg_isready -U postgres; do
            echo "Waiting for PostgreSQL to be ready..."
            sleep 3
          done
          docker compose exec db createdb -U postgres ${DB_NAME}
          docker compose run pum -vvv -p ${PGSERVICE} -d datamodel install ${{ inputs.pum_install_params }}

      - name: Translate (create sources)
        run: docker compose exec qgis sh -c "xvfb-run /usr/src/project/scripts/project-translation-create-source.py /usr/src/project/${QGS_PROJECT_FILE}.qgs"

      - name: Push to TX
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: project
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
        run: ../tx push --source

      - name: Compile Translations (fetch translated content)
        working-directory: project
        env:
          TX_TOKEN: ${{ secrets.TX_TOKEN }}
        run: |
          ../tx pull -a
          docker compose exec qgis sh -c '/usr/src/project/scripts/project-translation-compile.sh /usr/src/project/${QGS_PROJECT_FILE}.qgs'

      - name: Update project version
        if: inputs.release_tag != ''
        run: |
          sed -i "s|<title>${QGS_PROJECT_TITLE} - Demo</title>|<title>${QGS_PROJECT_TITLE} - v${{ inputs.release_tag }}</title>|" project/${QGS_PROJECT_FILE}.qgs
          sed -i "s|projectname=\"${QGS_PROJECT_TITLE} - Demo\"|projectname=\"${QGS_PROJECT_TITLE} - v${{ inputs.release_tag }}\"|" project/${QGS_PROJECT_FILE}.qgs

      - name: Create project package
        run: |
          # Create dev and prod versions with different PGSERVICE names
          sed "s/${PGSERVICE}/${PGSERVICE}_dev/g" project/${QGS_PROJECT_FILE}.qgs > project/${QGS_PROJECT_FILE}_dev.qgs
          sed "s/${PGSERVICE}/${PGSERVICE}_prod/g" project/${QGS_PROJECT_FILE}.qgs > project/${QGS_PROJECT_FILE}_prod.qgs

      - name: Upload project translations artifact
        id: upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: project
          path: |
            project/**/*
            !project/.tx
            !project/**/*.qgs~
            !project/scripts/*
          if-no-files-found: error

  release:
    name: Upload to GitHub Release
    needs: build
    if: inputs.release_tag != ''
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: project
          path: ./project-artifact

      - name: Create project translations zip
        run: |
          cd project-artifact/project
          zip -r ../../project-translations.zip .

      - name: Upload project translations as GitHub Release asset
        run: |
          gh release upload "${{ inputs.release_tag }}" project-translations.zip#oqtopus.project --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
