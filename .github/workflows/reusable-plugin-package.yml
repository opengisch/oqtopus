name: 🔌 Plugin | Package and release (reusable)

on:
  workflow_call:
    inputs:
      plugin_name:
        required: true
        type: string
        description: 'Plugin directory/package name (e.g., oqtopus, teksi_wastewater)'
      release_tag:
        required: false
        type: string
        default: ''
        description: 'Release tag version. Empty for dev builds (uses 0.0.0)'
      pre_package_commands:
        required: false
        type: string
        default: ''
        description: 'Shell commands to run before packaging (e.g., bundling dependencies)'
      asset_paths:
        required: false
        type: string
        default: ''
        description: 'Newline-separated list of asset paths for qgis-plugin-ci --asset-path'
      release_to_qgis_org:
        required: false
        type: boolean
        default: false
        description: 'Whether to also release to plugins.qgis.org'
      upload_to_github_release:
        required: false
        type: boolean
        default: true
        description: 'Whether to upload the plugin zip to the GitHub Release'
      github_release_asset_label:
        required: false
        type: string
        default: 'oqtopus.plugin'
        description: 'Label for the GitHub Release asset (e.g., oqtopus.plugin)'
    secrets:
      TX_TOKEN:
        required: false
      QGIS_ORG_TOKEN:
        required: false

jobs:
  plugin-package:
    name: Package and release plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Qt lrelease
        run: |
          sudo apt-get update
          sudo apt-get install qtbase5-dev qttools5-dev-tools

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci>=2.8.6

      - name: Run pre-package commands
        if: inputs.pre_package_commands != ''
        run: ${{ inputs.pre_package_commands }}

      - name: 🌍 Push translations
        if: github.event_name == 'push' && inputs.release_tag == ''
        run: qgis-plugin-ci push-translation ${{ secrets.TX_TOKEN }}

      - name: Package
        env:
          ASSET_PATHS: ${{ inputs.asset_paths }}
        run: |
          VERSION=${{ inputs.release_tag || '0.0.0' }}
          ASSET_ARGS=""
          if [ -n "$ASSET_PATHS" ]; then
            while IFS= read -r path; do
              path=$(echo "$path" | xargs)
              [ -n "$path" ] && ASSET_ARGS="$ASSET_ARGS --asset-path $path"
            done <<< "$ASSET_PATHS"
          fi
          qgis-plugin-ci -v package ${VERSION} \
            --allow-uncommitted-changes \
            ${ASSET_ARGS} \
            --transifex-token "${{ secrets.TX_TOKEN }}"

      - name: Upload artifact
        id: upload-artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.plugin_name }}_dev
          archive: false
          path: ${{ inputs.plugin_name }}.${{ inputs.release_tag || '0.0.0' }}.zip
          if-no-files-found: error

      - name: Comment on PR with artifact link
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: plugin-artifact
          message: |
            ## 🔌 Plugin Artifact

            A development build of the plugin is available for testing:

            **[⬇️ Download ${{ inputs.plugin_name }}_dev.zip](${{ steps.upload-artifact.outputs.artifact-url }})**

            > ⚠️ This is a development build from commit ${{ github.event.pull_request.head.sha }}.

      - name: Upload plugin as GitHub Release asset
        if: inputs.release_tag != '' && inputs.upload_to_github_release
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            "${{ inputs.plugin_name }}.${{ inputs.release_tag }}.zip#${{ inputs.github_release_asset_label }}" \
            --repo "$GITHUB_REPOSITORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release to QGIS plugin repository
        if: inputs.release_tag != '' && inputs.release_to_qgis_org
        env:
          ASSET_PATHS: ${{ inputs.asset_paths }}
        run: |
          ASSET_ARGS=""
          if [ -n "$ASSET_PATHS" ]; then
            while IFS= read -r path; do
              path=$(echo "$path" | xargs)
              [ -n "$path" ] && ASSET_ARGS="$ASSET_ARGS --asset-path $path"
            done <<< "$ASSET_PATHS"
          fi
          qgis-plugin-ci release ${{ inputs.release_tag }} \
            --allow-uncommitted-changes \
            ${ASSET_ARGS} \
            --github-token ${{ secrets.GITHUB_TOKEN }} \
            --qgis-token ${{ secrets.QGIS_ORG_TOKEN }} \
            --transifex-token "${{ secrets.TX_TOKEN }}"
